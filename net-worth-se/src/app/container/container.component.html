<nav class="top-level-content">
    <h2>Currency</h2>
    <h2>CAD</h2>
</nav>
<article class="top-level-content container" id="net-worth">
    <h2>Net Worth</h2>
    <h2>{{assetsTotal - liabilitiesTotal | currency:'CAD':''}}</h2> 
</article>
<sheet-form category="Assets" (childTotalChange)="updateAssets($event)" [properties]="assets"></sheet-form>
<sheet-form category="Liabilities" (childTotalChange)="updateLiabilities($event)" [properties]="liabilities"></sheet-form>
